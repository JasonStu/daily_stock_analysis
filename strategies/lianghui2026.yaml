instructions: |
  **2026年两会主题投资策略**

  本策略结合2026年两会政策方向选股，并使用技术指标进行买卖时机选择。

  ========================================
  一、选股范围（两会政策主题）
  ========================================

  重点关注以下政策扶持行业，按优先级排序：

  **第一梯队（最强催化）**：
  - 半导体/集成电路：国产替代加速，政策大力支持
  - AI算力/人工智能：大模型应用商业化，算电协同新基建
  - 低空经济：eVTOL、无人机配送等新兴产业
  - 商业航天：卫星互联网、火箭发射
  - 创新药：生物医药创新

  **第二梯队（政策+业绩）**：
  - 新能源：光伏、锂电、储能
  - 电网设备：新型电力系统建设
  - 高端制造：工业母机、机器人
  - 汽车/家电：以旧换新政策

  **第三梯队（防御+稳增长）**：
  - 消费：食品饮料、旅游酒店
  - 医药：中药、医疗器械
  - 农业：种业、粮食安全
  - 军工：国产替代、装备升级

  ========================================
  二、买入信号（技术面择时）
  ========================================

  使用以下技术指标组合判断买入时机：

  1. **均线金叉**（关联理念2：趋势交易）：
     - MA5 上穿 MA10，或 MA10 上穿 MA20
     - 均线需呈现多头排列（MA5 > MA10 > MA20）
     - 使用 `analyze_trend` 验证

  2. **RSI超卖反弹**（精确阈值）：
     - RSI(6) ≤ 10：极度超卖，显示"底"，强烈买入信号
     - 10 < RSI(6) ≤ 23：超卖区域，显示"买"，买入信号
     - 23 < RSI(6) < 80：正常波动区域
     - RSI(6) ≥ 80：超买区域，显示"顶"，卖出信号
     - 配合均线金叉时信号更强

  3. **均线回踩确认**（精确条件）：
     - MA30回踩：MA30>ref(MA30,1) AND ref(MA30,2)>ref(MA30,1) AND LLV(MA30,8)=ref(MA30,1)
       → 显示"30买"，表示连续3日上涨后回踩不破
     - MA60回踩：MA60>ref(MA60,1) AND ref(MA60,2)>ref(MA60,1) AND LLV(MA60,13)=ref(MA60,1)
       → 显示"60买"，表示连续3日上涨后回踩不破
     - 多周期共振：15分/60分/日/周/月MA60同时向上 → 可靠性更高

  4. **量能配合**：
     - 买入日成交量 > 5日均量
     - 量比 > 1.2 为积极信号
     - 底部放量更佳

  ========================================
  三、卖出信号
  ========================================

  1. **RSI超买**：
     - RSI(6) >= 80 显示"顶"
     - 考虑部分获利了结

  2. **均线死叉**：
     - MA5 下穿 MA10
     - 或跌破上升趋势线

  3. **止盈止损**：
     - 止盈：涨幅 > 20% 可考虑分批卖出
     - 止损：跌破买入日均线支撑 -5%

  ========================================
  四、评分调整
  ========================================

  - 两会第一梯队行业 +15分
  - 两会第二梯队行业 +10分
  - 两会第三梯队行业 +5分
  - RSI<=10 强烈信号（"底"） +10分
  - 10<RSI<=23 买入信号（"买"） +5分
  - MA30回踩确认（"30买"） +8分
  - MA60回踩确认（"60买"） +10分
  - 多周期MA60共振 +5分
  - MA5×MA10金叉 +10分
  - 均线多头排列 +5分
  - 成交量放大（量比>1.5） +5分
  - 符合多个条件可累加

  在 `buy_reason` 中注明："两会主题-[行业名]+技术信号"
  在 `pattern_analysis` 中记录具体技术指标数值

  ========================================
  五、风险提示
  ========================================

  - 两会政策具体内容可能变化，需关注最新政策动态
  - 技术指标存在假突破风险，建议分批建仓
  - 仓位建议：单只股票不超过总仓位20%
  - 止损必须严格执行
